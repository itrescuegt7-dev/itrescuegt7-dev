<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    
<style>
body{
    margin:0;
    background: linear-gradient(to bottom, #000000, #FF0000);
    color:white;
    font-family:Arial;
    text-align:center;
    }
     
h2{
    margin-top:25px;
     }

    #ganador{
    position:absolute;
    top:130px;
    left:200px;      
    font-size:58px;
    color:Red;
    margin-top:30px;
    font-weight:bold;
}
    .logo{
    width: 600px;
    height:auto;
    margin-top:10px;
}
    
#wheel{
    margin-top:100px;
}

button{
    margin-top:0px;
    margin-left:600px;
    padding:20px 30px;
    font-size:15px;
    cursor:pointer;
}


</style>

</head>

<body>
<div id="ganador"></div>
    
<img src="logo.png" class="logo">

    
<canvas id="wheel" width="600" height="600"></canvas>



<button id="btnGirar">🎯 GIRAR</button>

    




<script>

  
const parametros = new URLSearchParams(window.location.search);

const datos = parametros.get("datos");

let participantes = [];

if (datos && datos.length > 0) {
    participantes = decodeURIComponent(datos).split("|");
} else {
    participantes = [
        "Juan",
        "Pedro",
        "Ana",
        "Carlos"
    ];
}
const colores=[
"#F44336",
"#2196F3",
"#4CAF50",
"#FF9800",
"#9C27B0",
"#009688",
"#E91E63",
"#3F51B5"
];

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");

const centro=300;
const radio=250;

let rotacion=0;
let girando=false;
let ganadorIndex = 0;

function dibujar(){

ctx.clearRect(0,0,600,600);

const angulo=(2*Math.PI)/participantes.length;

for(let i=0;i<participantes.length;i++){

ctx.beginPath();

ctx.moveTo(centro,centro);

ctx.arc(
    centro,
    centro,
    radio,
    rotacion + i*angulo - Math.PI/2,
    rotacion + (i+1)*angulo - Math.PI/2
);

ctx.fillStyle=colores[i%colores.length];
ctx.fill();

ctx.save();

ctx.translate(centro,centro);

ctx.rotate(rotacion + i*angulo + angulo/2 - Math.PI/2);

ctx.fillStyle="white";
ctx.font="18px Arial";
ctx.textAlign="right";

ctx.fillText(participantes[i],220,5);

ctx.restore();

}

/* círculo central */

ctx.beginPath();
ctx.arc(centro,centro,40,0,2*Math.PI);
ctx.fillStyle="white";
ctx.fill();

/* flecha */

ctx.fillStyle="red";

ctx.beginPath();

ctx.moveTo(300,60);

ctx.lineTo(285,20);

ctx.lineTo(315,20);

ctx.fill();

ctx.shadowBlur;
ctx.shadowColor;
ctx.shadowOffsetX;
ctx.shadowOffsetY;

}

dibujar();

document.getElementById("btnGirar").onclick=girar;

function girar(){

    if(girando) return;

    girando = true;

    document.getElementById("ganador").innerHTML = "";

    const angulo = (2 * Math.PI) / participantes.length;

    // Elegir ganador al azar
    ganadorIndex = Math.floor(Math.random() * participantes.length);

    // Centro del sector ganador
    let anguloGanador = ganadorIndex * angulo + angulo / 2;

    // La flecha está en las 12 (90°)
    let destino =
        rotacion +
        8 * 2 * Math.PI +                // 8 vueltas completas
        (3 * Math.PI / 2 - anguloGanador);

    let inicio = rotacion;
    let duracion = 5000;
    let inicioTiempo = null;

    
function animacion(t){

if(!inicioTiempo) inicioTiempo=t;

let progreso=(t-inicioTiempo)/duracion;

if(progreso>1) progreso=1;

let ease=1-Math.pow(1-progreso,3);

rotacion=inicio+(destino-inicio)*ease;

dibujar();

if(progreso<1){

requestAnimationFrame(animacion);

}else{

girando=false;

mostrarGanador()
lanzarConfeti();

}

   function mostrarGanador() {

    const angulo = (2 * Math.PI) / participantes.length;

    let posicion = (2 * Math.PI - (rotacion % (2 * Math.PI))) % (2 * Math.PI);

    let indice = Math.floor(posicion / angulo);

    document.getElementById("ganador").innerHTML =
        "🏆 Ganador:<br>" + participantes[indice];
}
    }

    requestAnimationFrame(animacion);

}



</script>

</body>
</html>
